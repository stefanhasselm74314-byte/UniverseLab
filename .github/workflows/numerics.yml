name: Numerical validation

on:
  push:
    branches: [main, 'agent/**']
  pull_request:

permissions:
  contents: read

jobs:
  numerics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run analytical reference tests
        run: npm test
