name: 3D-Flug 0.8.4 Kino-Modus

on:
  push:
    paths:
      - '.github/workflows/3d-cinema-mode-084.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Kino-Modus einbauen
        shell: python
        run: |
          from pathlib import Path

          path = Path('universe3d.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace('UniverseLab 0.8.3 · 3D Cosmic Flight','UniverseLab 0.8.4 · 3D Cosmic Flight',1)
          text = text.replace('Alpha 0.8.3','Alpha 0.8.4',1)
          text = text.replace('.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px}', '.buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:8px}',1)

          css_anchor = '.cross:before,.cross:after{content:"";position:absolute;background:#d9ddff}.cross:before{width:18px;height:1px;top:8px}.cross:after{width:1px;height:18px;left:8px}'
          cinema_css = css_anchor + '''
.hud,.ul-shell{transition:opacity .24s ease,transform .24s ease}
.cinema-exit,.cinema-epoch{display:none;position:fixed;z-index:10005;pointer-events:auto}
.cinema-exit{right:max(12px,env(safe-area-inset-right));bottom:max(12px,env(safe-area-inset-bottom));min-height:40px;padding:8px 11px;border:1px solid #3a456e;border-radius:12px;background:#0a0f20d9;color:#f4f6ff;backdrop-filter:blur(12px);box-shadow:0 12px 34px #0008;opacity:.62}
.cinema-exit:hover,.cinema-exit:focus-visible{opacity:1;border-color:#8d7cff}
.cinema-epoch{left:50%;top:max(12px,env(safe-area-inset-top));transform:translateX(-50%);align-items:center;gap:7px;padding:7px 11px;border:1px solid #334066;border-radius:999px;background:#080d1bcc;color:#dfe4ff;font-size:11px;font-weight:800;backdrop-filter:blur(12px);box-shadow:0 10px 30px #0007}
.cinema-epoch::before{content:'✦';color:#78e1b8}
body.cinema{padding-top:0!important}
body.cinema .hud{opacity:0;pointer-events:none}
body.cinema .ul-shell{opacity:0;pointer-events:none;transform:translateY(-115%)}
body.cinema .cinema-exit,body.cinema .cinema-epoch{display:flex}
body.cinema .cross{opacity:.34}
'''
          if css_anchor not in text:
              raise SystemExit('CSS-Anker nicht gefunden')
          text = text.replace(css_anchor, cinema_css, 1)

          body_anchor = '<canvas id="view"></canvas><div class="cross"></div>'
          body_new = '<canvas id="view"></canvas><div class="cross"></div><div id="cinemaEpoch" class="cinema-epoch">Heute</div><button id="cinemaExit" class="cinema-exit" type="button" aria-label="Kino-Modus beenden">Steuerung einblenden</button>'
          if body_anchor not in text:
              raise SystemExit('Canvas-Anker nicht gefunden')
          text = text.replace(body_anchor, body_new, 1)

          buttons_old = '<div class="buttons"><button class="primary" id="play">⏸ Flug</button><button id="mode">Kosmisches Netz</button><a href="./journey.html">Zeitreise</a><a href="./compare.html">Modelle</a></div>'
          buttons_new = '<div class="buttons"><button class="primary" id="play">⏸ Flug</button><button id="mode">Kosmisches Netz</button><button id="cinema">Kino</button><a href="./journey.html">Zeitreise</a><a href="./compare.html">Modelle</a></div>'
          if buttons_old not in text:
              raise SystemExit('Button-Anker nicht gefunden')
          text = text.replace(buttons_old, buttons_new, 1)

          hud_old = " $('#epoch').value=epoch(a);"
          hud_new = " $('#epoch').value=epoch(a);\n $('#cinemaEpoch').textContent=epoch(a);"
          if hud_old not in text:
              raise SystemExit('HUD-Anker nicht gefunden')
          text = text.replace(hud_old, hud_new, 1)

          mode_anchor = "$('#mode').onclick=()=>{network=!network;$('#mode').textContent=network?'Kosmisches Netz':'Galaxienflug'};"
          cinema_js = mode_anchor + '''
let cinema=false;
function applyCinemaState(active){
 cinema=active;
 document.body.classList.toggle('cinema',active);
 $('#cinema').textContent=active?'Steuerung':'Kino';
 $('#cinema').setAttribute('aria-pressed',String(active));
}
async function setCinema(active,manageFullscreen=true){
 applyCinemaState(active);
 if(active){
  if(manageFullscreen&&!document.fullscreenElement&&document.documentElement.requestFullscreen){
   try{await document.documentElement.requestFullscreen({navigationUI:'hide'})}catch{}
  }
  if(screen.orientation&&screen.orientation.lock){try{await screen.orientation.lock('landscape')}catch{}}
 }else{
  if(screen.orientation&&screen.orientation.unlock){try{screen.orientation.unlock()}catch{}}
  if(manageFullscreen&&document.fullscreenElement&&document.exitFullscreen){try{await document.exitFullscreen()}catch{}}
 }
}
$('#cinema').onclick=()=>setCinema(true);
$('#cinemaExit').onclick=()=>setCinema(false);
document.addEventListener('fullscreenchange',()=>{if(cinema&&!document.fullscreenElement)applyCinemaState(false)});
addEventListener('keydown',event=>{
 if(event.key.toLowerCase()==='k'&&!event.ctrlKey&&!event.metaKey&&!event.altKey){event.preventDefault();setCinema(!cinema)}
});
'''
          if mode_anchor not in text:
              raise SystemExit('Modus-Anker nicht gefunden')
          text = text.replace(mode_anchor, cinema_js, 1)

          path.write_text(text, encoding='utf-8')

      - name: Cache-Busting aktualisieren
        shell: python
        run: |
          from pathlib import Path
          import re

          shell=Path('app-shell.js')
          text=shell.read_text(encoding='utf-8')
          text=re.sub(r"\['\./universe3d\.html(?:\?v=\d+)?','✦','3D-Flug','universe3d'\]", "['./universe3d.html?v=084','✦','3D-Flug','universe3d']", text, count=1)
          shell.write_text(text,encoding='utf-8')

          refresh=Path('refresh-3d.html')
          if refresh.exists():
              text=refresh.read_text(encoding='utf-8')
              text=re.sub(r'universe3d\.html\?v=\d+-\$\{version\}', 'universe3d.html?v=084-${version}', text, count=1)
              refresh.write_text(text,encoding='utf-8')

          sw=Path('sw.js')
          text=sw.read_text(encoding='utf-8')
          text=re.sub(r"const CACHE_NAME='universelab-ui-[^']+';", "const CACHE_NAME='universelab-ui-2.0.2';", text, count=1)
          sw.write_text(text,encoding='utf-8')

      - name: Prüfen und speichern
        shell: bash
        run: |
          grep -q 'Alpha 0.8.4' universe3d.html
          grep -q 'cinemaExit' universe3d.html
          grep -q 'body.cinema .hud' universe3d.html
          grep -q 'universe3d.html?v=084' app-shell.js
          grep -q "universelab-ui-2.0.2" sw.js
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add universe3d.html app-shell.js refresh-3d.html sw.js
          git commit -m '3D-Flug 0.8.4: Kino-Modus und Vollbildsteuerung ergänzen'
          git push
