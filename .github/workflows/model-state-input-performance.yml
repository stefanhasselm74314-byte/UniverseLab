name: Modellregler effizient synchronisieren

on:
  push:
    paths:
      - '.github/workflows/model-state-input-performance.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Redundante Input-Rückkopplung vermeiden
        shell: python
        run: |
          from pathlib import Path
          path=Path('model-state.js')
          text=path.read_text(encoding='utf-8')
          replacements={
            "function detail(){return{...state,...params()};}":"function detail(source='api'){return{...state,...params(),source};}",
            "function notify(){":"function notify(source='api'){",
            "{detail:detail()}":"{detail:detail(source)}",
            "    notify();":"    notify(meta.source||'api');",
            "if(Object.keys(patch).length)set(patch,{label:'Eigenes Modell'});":"if(Object.keys(patch).length)set(patch,{label:'Eigenes Modell',source:'input'});",
            "addEventListener('universelab:modelchange',writeInputs);":"addEventListener('universelab:modelchange',event=>{if(event.detail?.source!=='input')writeInputs();});",
            "{detail:detail()}));":"{detail:detail('storage')}));"
          }
          for old,new in replacements.items():
            if old in text:
              text=text.replace(old,new,1)
            elif new not in text:
              raise SystemExit(f'Anker nicht gefunden: {old}')
          path.write_text(text,encoding='utf-8')
      - name: Cache-Version erhöhen
        shell: python
        run: |
          from pathlib import Path
          path=Path('sw.js')
          text=path.read_text(encoding='utf-8').replace("universelab-ui-2.0.0","universelab-ui-2.0.1",1)
          path.write_text(text,encoding='utf-8')
      - name: Prüfen und speichern
        shell: bash
        run: |
          grep -q "source:'input'" model-state.js
          grep -q "source!=='input'" model-state.js
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add model-state.js sw.js
          git commit -m 'Modellzustand: Slider ohne redundante Neuberechnungen synchronisieren'
          git push
