name: 3D-Flug Galaxien natürlicher darstellen

on:
  push:
    paths:
      - '.github/workflows/galaxy-natural-scale-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Galaxien kleiner, weicher und seltener darstellen
        shell: python
        run: |
          from pathlib import Path

          path = Path('universe3d.html')
          text = path.read_text(encoding='utf-8')

          replacements = {
              'Alpha 0.8.1': 'Alpha 0.8.2',
              'UniverseLab 0.8.1 · 3D Cosmic Flight': 'UniverseLab 0.8.2 · 3D Cosmic Flight',
              'const galaxyCount=mobile?42:78;': 'const galaxyCount=mobile?24:48;',
              'size:8+Math.pow(rng(),.42)*24': 'size:5+Math.pow(rng(),.5)*14',
          }
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)

          start = text.index('function drawGalaxy(g,q,t,alpha,futureW){')
          end = text.index('function drawGalaxies(t,a,s){', start)
          new_draw_galaxy = '''function galaxyScreenSize(g,q){
 const maxSize=compact()?18:26;
 return Math.min(maxSize,g.size*(.22+q.f*1.35));
}
function drawGalaxy(g,q,t,alpha,futureW){
 const base=galaxyScreenSize(g,q);
 const angle=g.angle+Math.sin(t*.000022+g.phase)*.12;
 ctx.save();
 ctx.translate(q.x,q.y);
 ctx.rotate(angle);
 ctx.globalCompositeOperation='lighter';
 ctx.filter='blur(.35px)';
 const grad=ctx.createRadialGradient(0,0,0,0,0,base);
 const core=g.hue<.34?'#ffd5a4':g.hue<.72?'#dce7ff':'#bcaeff';
 grad.addColorStop(0,'rgba(255,255,255,.92)');
 grad.addColorStop(.10,core+'c0');
 grad.addColorStop(.38,core+'58');
 grad.addColorStop(1,'rgba(0,0,0,0)');
 ctx.globalAlpha=alpha;
 ctx.fillStyle=grad;
 ctx.beginPath();
 ctx.ellipse(0,0,base*1.08,Math.max(1.2,base*g.flat),0,0,TAU);
 ctx.fill();
 if(alpha>.18&&base>7){
  ctx.filter='blur(.2px)';
  ctx.globalAlpha=alpha*.13*(1-futureW*.55);
  ctx.strokeStyle=core;
  ctx.lineWidth=.42;
  const armCount=Math.min(2,g.arms);
  for(let arm=0;arm<armCount;arm++){
   ctx.beginPath();
   for(let j=0;j<13;j++){
    const u=j/12;
    const ang=arm*TAU/armCount+u*TAU*.78;
    const rr=base*(.16+.70*u);
    const x=Math.cos(ang)*rr;
    const y=Math.sin(ang)*rr*g.flat;
    j?ctx.lineTo(x,y):ctx.moveTo(x,y);
   }
   ctx.stroke();
  }
 }
 ctx.restore();
 ctx.globalAlpha=1;
}
'''
          text = text[:start] + new_draw_galaxy + text[end:]

          old_galaxies = '''function drawGalaxies(t,a,s){
 const galaxyFrac=clamp((a-.065)/.65);
 const futureRemain=mix(1,.22,s.futureW);
 const active=Math.floor(galaxies.length*galaxyFrac*futureRemain);
 const expansion=1+s.futureW*2.8;
 const items=[];
 for(let i=0;i<active;i++){
  const g=galaxies[i];
  if(s.futureW>.6&&!g.local&&g.birth>.12)continue;
  const q=project(g,.72+s.structureW*.36,expansion);if(q)items.push({g,q});
 }
 items.sort((A,B)=>B.q.z-A.q.z);
 for(const {g,q} of items){
  const alpha=clamp((.08+.84*q.f)*s.structureW*(1-s.futureW*.48));
  drawGalaxy(g,q,t,alpha,s.futureW);
 }
}
'''
          new_galaxies = '''function drawGalaxies(t,a,s){
 const galaxyFrac=clamp((a-.065)/.65);
 const futureRemain=mix(1,.18,s.futureW);
 const active=Math.floor(galaxies.length*galaxyFrac*futureRemain);
 const expansion=1+s.futureW*2.8;
 const items=[];
 for(let i=0;i<active;i++){
  const g=galaxies[i];
  if(s.futureW>.6&&!g.local&&g.birth>.10)continue;
  const q=project(g,.72+s.structureW*.36,expansion);
  if(q)items.push({g,q});
 }
 items.sort((A,B)=>B.q.z-A.q.z);
 const placed=[];
 for(const {g,q} of items){
  const radius=galaxyScreenSize(g,q);
  const overlap=placed.some(p=>{
   const dx=p.x-q.x,dy=p.y-q.y;
   return dx*dx+dy*dy<Math.pow((p.r+radius)*.68,2);
  });
  if(overlap)continue;
  const alpha=clamp((.055+.70*q.f)*s.structureW*(1-s.futureW*.55));
  drawGalaxy(g,q,t,alpha,s.futureW);
  placed.push({x:q.x,y:q.y,r:radius});
 }
}
'''
          if old_galaxies not in text:
              raise SystemExit('drawGalaxies-Block nicht gefunden')
          text = text.replace(old_galaxies, new_galaxies, 1)
          path.write_text(text, encoding='utf-8')

      - name: Cache-sicheren Link und Cache-Version setzen
        shell: python
        run: |
          from pathlib import Path

          shell = Path('app-shell.js')
          text = shell.read_text(encoding='utf-8')
          text = text.replace("['./universe3d.html','✦','3D-Flug','universe3d']", "['./universe3d.html?v=082','✦','3D-Flug','universe3d']", 1)
          shell.write_text(text, encoding='utf-8')

          sw = Path('sw.js')
          text = sw.read_text(encoding='utf-8')
          for old in ['universelab-ui-1.9.2','universelab-ui-1.9.3']:
              text = text.replace(old, 'universelab-ui-1.9.4', 1)
          sw.write_text(text, encoding='utf-8')

      - name: Prüfen und committen
        shell: bash
        run: |
          grep -q 'Alpha 0.8.2' universe3d.html
          grep -q 'galaxyScreenSize' universe3d.html
          grep -q 'universe3d.html?v=082' app-shell.js
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add universe3d.html app-shell.js sw.js
          git commit -m '3D-Flug 0.8.2: Galaxien natürlicher skalieren und Cache umgehen'
          git push
