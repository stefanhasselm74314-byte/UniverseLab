name: Inject portal live preview

on:
  push:
    paths:
      - '.github/workflows/inject-portal-live.yml'

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add portal live script
        shell: python
        run: |
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '<script src="./app-shell.js"></script>'
          insert = '<script src="./portal-live.js"></script>\n' + marker
          if './portal-live.js' not in text:
              if marker not in text:
                  raise SystemExit('app-shell marker not found')
              path.write_text(text.replace(marker, insert), encoding='utf-8')
      - name: Commit portal integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Integrate live ΛCDM preview into portal"
          git push
